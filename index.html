<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>내 조건 매물 지도</title>
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#4f46e5">
<link rel="apple-touch-icon" href="/icon.svg">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
  * { box-sizing:border-box; }
  html,body { margin:0; height:100%; font-family:-apple-system,"Malgun Gothic",sans-serif; }
  #wrap { display:flex; height:100vh; }
  #side { width:380px; display:flex; flex-direction:column; border-right:1px solid #e5e7eb; background:#fafafa; }
  #map { flex:1; }
  header { padding:12px 14px; border-bottom:1px solid #e5e7eb; background:#fff; }
  header h1 { font-size:15px; margin:0 0 8px; }
  textarea { width:100%; height:120px; resize:vertical; font-size:12px; padding:8px; border:1px solid #d1d5db; border-radius:6px; }
  .filters { display:flex; gap:6px; margin:8px 0; flex-wrap:wrap; }
  .filters label { font-size:11px; color:#374151; display:flex; flex-direction:column; gap:2px; }
  .filters input { width:72px; padding:4px 6px; border:1px solid #d1d5db; border-radius:5px; font-size:12px; }
  button { width:100%; padding:9px; background:#4f46e5; color:#fff; border:0; border-radius:6px; font-size:13px; font-weight:700; cursor:pointer; }
  button:disabled { background:#9ca3af; }
  .btnrow { display:flex; gap:6px; margin-top:6px; }
  .btn2 { flex:1; padding:7px; background:#eef2ff; color:#4f46e5; border:1px solid #c7d2fe; border-radius:6px; font-size:12px; font-weight:700; cursor:pointer; }
  .hist-item { padding:10px 14px; border-bottom:1px solid #eee; cursor:pointer; }
  .hist-item:hover { background:#f3f4f6; }
  .hist-item .t { font-size:12px; font-weight:700; }
  .hist-item .s { font-size:11px; color:#6b7280; margin-top:2px; }
  .hist-del { float:right; color:#ef4444; font-size:11px; }
  .legend { display:flex; gap:10px; margin-top:8px; font-size:11px; }
  .dot { display:inline-block; width:10px; height:10px; border-radius:50%; margin-right:4px; vertical-align:middle; }
  #list { flex:1; overflow-y:auto; }
  .sec { font-size:11px; font-weight:700; color:#6b7280; padding:8px 14px 4px; background:#f3f4f6; }
  .card { padding:11px 14px; border-bottom:1px solid #eee; cursor:pointer; }
  .card:hover { background:#f3f4f6; } .card.active { background:#eef2ff; }
  .card .nm { font-weight:700; font-size:13px; margin-bottom:3px; }
  .card .row { font-size:11.5px; color:#374151; margin:1px 0; }
  .badge { font-size:10px; padding:2px 6px; border-radius:9px; color:#fff; }
  .b-통과 { background:#16a34a; } .b-재검토 { background:#f59e0b; }
  .b-제외 { background:#9ca3af; } .b-확인필요 { background:#6366f1; }
  .reason { font-size:11px; color:#b45309; margin-top:2px; }
  .marker-pin { width:24px; height:24px; border-radius:50% 50% 50% 0; transform:rotate(-45deg);
    border:2px solid #fff; box-shadow:0 1px 4px rgba(0,0,0,.4); }
  .marker-pin span { transform:rotate(45deg); display:block; text-align:center; color:#fff; font-size:11px; font-weight:700; line-height:20px; }
  .status-msg { font-size:12px; color:#6b7280; padding:10px 14px; }
  .stn-label { background:#16b47f; color:#fff; border:0; font-size:11px; font-weight:700; padding:1px 6px; border-radius:4px; box-shadow:0 1px 2px rgba(0,0,0,.3); }
  .stn-label::before { display:none !important; }
  @media (max-width: 820px) {
    html, body { height:auto; }
    #wrap { flex-direction:column; height:auto; }
    #side { width:100%; border-right:none; border-bottom:1px solid #e5e7eb; }
    #list { flex:none; max-height:42vh; }
    #map { width:100%; height:62vh; min-height:340px; }
  }
</style>
</head>
<body>
<div id="wrap">
  <div id="side">
    <header>
      <h1>내 조건 매물 지도</h1>
      <textarea id="input" placeholder="카카오톡 매물 목록을 그대로 붙여넣으세요."></textarea>
      <div class="filters">
        <label>전세가 상한(만원)<input id="dep" type="number" value="15000"></label>
        <label>관리비 상한(만원)<input id="mgmt" type="number" value="10"></label>
        <label>도보 한도(분)<input id="walk" type="number" value="15"></label>
      </div>
      <button id="run">매물 필터 + 지도 표기</button>
      <div class="btnrow">
        <button class="btn2" id="paste">복사한 매물 불러오기</button>
        <button class="btn2" id="hist">최근 조회</button>
      </div>
      <div class="legend">
        <span><i class="dot" style="background:#16a34a"></i>통과</span>
        <span><i class="dot" style="background:#f59e0b"></i>재검토</span>
        <span><i class="dot" style="background:#9ca3af"></i>제외</span>
      </div>
    </header>
    <div id="list"><div class="status-msg">매물을 붙여넣고 버튼을 누르세요.</div></div>
  </div>
  <div id="map"></div>
</div>
<script>
var COLORS = {"통과":"#16a34a","재검토":"#f59e0b","제외":"#9ca3af","확인필요":"#6366f1"};
var map = L.map('map').setView([37.4813,126.9527], 14);
L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', {
  maxZoom:20, attribution:'&copy; OpenStreetMap &copy; CARTO'
}).addTo(map);
var layer = L.layerGroup().addTo(map);
var markers = {};

// 2호선 사당~신림 역 표시(어느 점이 무슨 역인지 보이도록)
var STATIONS=[
  {name:'사당역',lat:37.47653,lon:126.98166},
  {name:'낙성대역',lat:37.47698,lon:126.96368},
  {name:'서울대입구역',lat:37.48132,lon:126.95269},
  {name:'봉천역',lat:37.48240,lon:126.94180},
  {name:'신림역',lat:37.48425,lon:126.92973}
];
var stnLayer=L.layerGroup().addTo(map);
L.polyline(STATIONS.map(function(s){return [s.lat,s.lon];}),
  {color:'#16b47f', weight:5, opacity:0.65}).addTo(stnLayer);
STATIONS.forEach(function(s){
  L.circleMarker([s.lat,s.lon],{radius:6,color:'#16b47f',fillColor:'#fff',fillOpacity:1,weight:3})
    .addTo(stnLayer)
    .bindTooltip(s.name,{permanent:true,direction:'right',className:'stn-label',offset:[6,0]});
});

function won(m){ return (m/10000).toFixed(2)+'억 ('+m.toLocaleString()+'만원)'; }
function walkTxt(d){ return d.walk_min!=null ? (d.station+' 도보 '+d.walk_min+'분') : '도보 미확인'; }
function popupHtml(d){
  var r = d.reasons&&d.reasons.length ? '<div class="row" style="color:#b45309">확인: '+d.reasons.join(' / ')+'</div>':'';
  var dest = d.dest_km!=null ? '<br>'+(d.dest_name||'선릉역')+'까지 약 '+d.dest_km+'km' : '';
  return '<div><b>'+d.name+'</b><br>전세 '+won(d.deposit)+'<br>관리비 '+d.mgmt+'만원 · '+d.type+'('+d.form_raw+')<br>'
    +walkTxt(d)+dest+'<br>층 '+d.floor+'<br>보증보험 '+(d.deposit_ins?'가입가능':'미표기')+' · 버팀목 '+d.loan+r
    +'<br><span style="color:#6b7280">'+d.address+'</span></div>';
}

function render(res, fromHistory){
  if(!fromHistory) saveHistory(res);
  layer.clearLayers(); markers = {};
  var list = document.getElementById('list'); list.innerHTML='';
  var shown = res.records.slice(); // 통과+재검토
  var pts = [];
  shown.forEach(function(d,i){
    if(d.lat==null) return;
    var color = COLORS[d.status]||'#9ca3af';
    var icon = L.divIcon({className:'', iconSize:[24,24], iconAnchor:[12,24],
      html:'<div class="marker-pin" style="background:'+color+'"><span>'+(i+1)+'</span></div>'});
    var mk = L.marker([d.lat,d.lon],{icon:icon}).addTo(layer).bindPopup(popupHtml(d));
    markers[i]=mk; pts.push([d.lat,d.lon]);
  });
  setTimeout(function(){ map.invalidateSize(); if(pts.length) map.fitBounds(pts,{padding:[40,40], maxZoom:16}); }, 100);

  if(!shown.length){ list.innerHTML='<div class="status-msg">조건에 맞는 매물이 없습니다.</div>'; return; }
  var destName = res.dest_name || '선릉역';
  var lastStatus = null;
  shown.forEach(function(d,i){
    if(d.status !== lastStatus){
      lastStatus = d.status;
      var cnt = shown.filter(function(x){return x.status===d.status;}).length;
      var h=document.createElement('div'); h.className='sec';
      h.textContent=d.status+' '+cnt+'건 ('+destName+' 가까운 순)'; list.appendChild(h);
    }
    var destTxt = d.dest_km!=null ? (destName+'까지 약 '+d.dest_km+'km') : '';
    var r = d.reasons&&d.reasons.length ? '<div class="reason">확인: '+d.reasons.join(' / ')+'</div>':'';
    var el=document.createElement('div'); el.className='card';
    el.innerHTML='<div class="nm">'+(i+1)+'. '+d.name+' <span class="badge b-'+d.status+'">'+d.status+'</span></div>'
      +'<div class="row">전세 '+won(d.deposit)+' · 관리비 '+d.mgmt+'만원</div>'
      +'<div class="row">'+walkTxt(d)+' · '+d.type+' · '+d.floor+'</div>'
      +(destTxt?'<div class="row" style="color:#4f46e5">'+destTxt+'</div>':'')
      +'<div class="row">보증보험 '+(d.deposit_ins?'가입가능':'미표기')+' · 버팀목 '+d.loan+'</div>'+r;
    el.onclick=function(){
      document.querySelectorAll('.card').forEach(function(c){c.classList.remove('active');});
      el.classList.add('active');
      if(markers[i]){ map.setView([d.lat,d.lon],17); markers[i].openPopup(); }
    };
    list.appendChild(el);
  });
}

function callProcess(text){
  return fetch('/api/process',{method:'POST',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({text:text, params:{
      deposit_max:+document.getElementById('dep').value,
      mgmt_max:+document.getElementById('mgmt').value,
      walk_limit:+document.getElementById('walk').value }})})
  .then(function(r){return r.json();});
}
document.getElementById('run').onclick=function(){
  var btn=this; var text=document.getElementById('input').value.trim();
  if(!text){ alert('매물 목록을 붙여넣으세요.'); return; }
  btn.disabled=true; btn.textContent='계산 중...';
  callProcess(text)
  .then(function(res){ if(res && res.error){alert('오류: '+res.error);} else if(res){render(res);} })
  .catch(function(e){ alert('요청 실패: '+e); })
  .finally(function(){ btn.disabled=false; btn.textContent='매물 필터 + 지도 표기'; });
};
// 조회 기록(기기 저장) --------------------------------------------------
var HKEY='rf_history';
function loadHist(){ try{ return JSON.parse(localStorage.getItem(HKEY)||'[]'); }catch(e){ return []; } }
function saveHistory(res){
  if(!res || !res.records) return;
  var h=loadHist();
  var pass=res.records.filter(function(x){return x.status==='통과';}).length;
  var rev=res.records.filter(function(x){return x.status==='재검토';}).length;
  h.unshift({ ts:new Date().toISOString(), pass:pass, rev:rev,
    dest_name:res.dest_name, limit:res.limit, records:res.records });
  if(h.length>30) h=h.slice(0,30);
  try{ localStorage.setItem(HKEY, JSON.stringify(h)); }catch(e){}
}
function fmtTs(iso){
  var d=new Date(iso);
  var p=function(n){return (n<10?'0':'')+n;};
  return (d.getMonth()+1)+'/'+d.getDate()+' '+p(d.getHours())+':'+p(d.getMinutes());
}
function showHistory(){
  var h=loadHist();
  var list=document.getElementById('list'); list.innerHTML='';
  var head=document.createElement('div'); head.className='sec';
  head.textContent='최근 조회 '+h.length+'건 (탭하면 지도에 다시 표시)'; list.appendChild(head);
  if(!h.length){ var m=document.createElement('div'); m.className='status-msg'; m.textContent='저장된 조회 기록이 없습니다.'; list.appendChild(m); return; }
  h.forEach(function(item, idx){
    var el=document.createElement('div'); el.className='hist-item';
    el.innerHTML='<span class="hist-del" data-i="'+idx+'">삭제</span>'
      +'<div class="t">'+fmtTs(item.ts)+'</div>'
      +'<div class="s">통과 '+item.pass+' · 재검토 '+item.rev+' · 도보 '+(item.limit||15)+'분</div>';
    el.onclick=function(ev){
      if(ev.target.classList.contains('hist-del')){
        ev.stopPropagation();
        var hh=loadHist(); hh.splice(idx,1); localStorage.setItem(HKEY, JSON.stringify(hh)); showHistory(); return;
      }
      render({records:item.records, dest_name:item.dest_name, limit:item.limit}, true);
    };
    list.appendChild(el);
  });
}
document.getElementById('hist').onclick=showHistory;

// 복사한 매물 불러오기(클립보드 -> 자동 필터). 공유 시트 대신 안정적.
document.getElementById('paste').onclick=function(){
  if(!navigator.clipboard || !navigator.clipboard.readText){
    alert('이 브라우저는 클립보드 읽기를 지원하지 않습니다. 위 칸에 직접 붙여넣어 주세요.'); return;
  }
  navigator.clipboard.readText().then(function(t){
    if(!t || !t.trim()){ alert('클립보드가 비어 있습니다. 카톡에서 매물 글을 먼저 복사하세요.'); return; }
    document.getElementById('input').value=t;
    document.getElementById('run').click();
  }).catch(function(){
    alert('클립보드 읽기 권한이 필요합니다. 위 칸에 직접 붙여넣거나, 권한을 허용해 주세요.');
  });
};

window.addEventListener('resize', function(){ map.invalidateSize(); });

// PWA: 서비스워커 등록(홈 화면 추가 + 공유 대상 등록용)
if('serviceWorker' in navigator){ navigator.serviceWorker.register('/sw.js').catch(function(){}); }

// 카톡 등에서 공유로 들어온 텍스트(?text=...)를 자동으로 필터 실행
(function(){
  var shared = new URLSearchParams(location.search).get('text');
  if(shared){
    document.getElementById('input').value = shared;
    history.replaceState(null, '', location.pathname);
    document.getElementById('run').click();
  }
})();
</script>
</body>
</html>
